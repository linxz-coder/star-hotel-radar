
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>星级酒店捡漏雷达 手机宣传图</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #172034;
      letter-spacing: 0;
    }
    body {
      background: #f4f6f2;
    }
    .poster {
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      padding: 78px 72px;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 213, 122, 0.34), transparent 28%),
        linear-gradient(145deg, #fbf7ec 0%, #e7f0ee 46%, #eef4fb 100%);
    }
    .poster.dark {
      color: #fff;
      background: #101927;
    }
    .poster.photo-led {
      color: #fff;
      background: #101927;
    }
    .bg-photo {
      position: absolute;
      inset: 0;
      background: #1c2430;
    }
    .bg-photo img,
    .photo img,
    .tile-photo img,
    .hero-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .bg-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(10, 18, 32, 0.66) 0%, rgba(10, 18, 32, 0.24) 42%, rgba(10, 18, 32, 0.9) 100%),
        linear-gradient(90deg, rgba(10, 18, 32, 0.58), transparent 66%);
    }
    .kicker {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(23, 32, 52, 0.1);
      color: #2c5f5f;
      font-size: 25px;
      font-weight: 700;
      backdrop-filter: blur(16px);
    }
    .dark .kicker,
    .photo-led .kicker {
      color: #ffe2a1;
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.24);
    }
    .kicker::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e8923b;
    }
    h1 {
      position: relative;
      margin: 28px 0 0;
      max-width: 890px;
      font-size: 82px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
    }
    h1 .accent {
      color: #0c8f79;
    }
    .dark h1 .accent,
    .photo-led h1 .accent {
      color: #ffcf6a;
    }
    .sub {
      position: relative;
      margin-top: 26px;
      max-width: 820px;
      color: rgba(23, 32, 52, 0.72);
      font-size: 33px;
      line-height: 1.45;
      font-weight: 520;
    }
    .dark .sub,
    .photo-led .sub {
      color: rgba(255, 255, 255, 0.82);
    }
    .brand-foot {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      color: rgba(23, 32, 52, 0.66);
      font-size: 24px;
      font-weight: 650;
      z-index: 5;
    }
    .dark .brand-foot,
    .photo-led .brand-foot {
      color: rgba(255, 255, 255, 0.74);
    }
    .logo-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 50px;
      padding: 0 20px;
      border-radius: 999px;
      background: #172034;
      color: #fff;
      font-size: 24px;
      font-weight: 800;
    }
    .dark .logo-pill,
    .photo-led .logo-pill {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .phone {
      position: relative;
      width: 640px;
      height: 1290px;
      border-radius: 64px;
      padding: 16px;
      background: #111827;
      box-shadow: 0 38px 90px rgba(16, 24, 39, 0.32);
      z-index: 3;
    }
    .phone.large {
      width: 706px;
      height: 1378px;
    }
    .phone.compact-phone {
      width: 560px;
      height: 1120px;
      border-radius: 56px;
    }
    .screen {
      height: 100%;
      overflow: hidden;
      border-radius: 50px;
      background: #f7f8f4;
      color: #172034;
      padding: 30px 26px 28px;
      position: relative;
    }
    .phone.large .screen {
      border-radius: 54px;
      padding: 34px 30px 30px;
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 26px;
      color: rgba(23, 32, 52, 0.72);
      font-size: 18px;
      font-weight: 800;
    }
    .status i {
      display: inline-block;
      width: 68px;
      height: 18px;
      border-radius: 99px;
      background: #111827;
    }
    .app-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-top: 28px;
    }
    .app-title b {
      font-size: 33px;
      line-height: 1.12;
      font-weight: 900;
    }
    .app-title span {
      color: #0c8f79;
      font-size: 20px;
      font-weight: 800;
      white-space: nowrap;
    }
    .search-card {
      margin-top: 24px;
      padding: 20px;
      border-radius: 28px;
      background: #fff;
      border: 1px solid rgba(23, 32, 52, 0.08);
      box-shadow: 0 18px 40px rgba(43, 57, 77, 0.08);
    }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .field {
      min-height: 72px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #eef4f0;
    }
    .field strong {
      display: block;
      color: rgba(23, 32, 52, 0.52);
      font-size: 16px;
      font-weight: 800;
    }
    .field span {
      display: block;
      margin-top: 5px;
      font-size: 22px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-button {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 64px;
      margin-top: 14px;
      border-radius: 20px;
      background: #0c8f79;
      color: #fff;
      font-size: 23px;
      font-weight: 900;
    }
    .progress {
      margin-top: 22px;
      display: grid;
      gap: 10px;
    }
    .progress-top {
      display: flex;
      justify-content: space-between;
      color: rgba(23, 32, 52, 0.62);
      font-size: 18px;
      font-weight: 800;
    }
    .bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(12, 143, 121, 0.12);
    }
    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0c8f79, #efb14f);
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .tab {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      border-radius: 17px;
      background: #e9efeb;
      color: rgba(23, 32, 52, 0.68);
      font-size: 17px;
      font-weight: 900;
      text-align: center;
    }
    .tab.active {
      background: #172034;
      color: #fff;
    }
    .feed {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }
    .hotel-card {
      display: grid;
      grid-template-columns: 138px 1fr;
      gap: 16px;
      min-height: 158px;
      padding: 12px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 16px 34px rgba(43, 57, 77, 0.09);
      border: 1px solid rgba(23, 32, 52, 0.06);
      position: relative;
      overflow: hidden;
    }
    .phone.large .hotel-card {
      grid-template-columns: 156px 1fr;
      min-height: 176px;
    }
    .photo {
      position: relative;
      min-height: 134px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, #dbe9e4, #f3d29c);
    }
    .photo.is-missing::after {
      content: "HOTEL";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(23, 32, 52, 0.5);
      font-size: 18px;
      font-weight: 900;
    }
    .hotel-info {
      min-width: 0;
      padding: 4px 4px 2px 0;
    }
    .hotel-name {
      font-size: 22px;
      line-height: 1.22;
      font-weight: 900;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .phone.large .hotel-name {
      font-size: 24px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .meta span {
      height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: #edf3ef;
      color: rgba(23, 32, 52, 0.62);
      font-size: 15px;
      line-height: 26px;
      font-weight: 800;
    }
    .price-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
    }
    .price {
      color: #d85d3f;
      font-size: 30px;
      line-height: 1;
      font-weight: 950;
    }
    .save {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 12px;
      background: #fff2d9;
      color: #b45b16;
      font-size: 17px;
      font-weight: 950;
      white-space: nowrap;
    }
    .save.pending {
      color: #0c6c74;
      background: #e2f4f0;
    }
    .save.muted {
      color: rgba(23, 32, 52, 0.56);
      background: #eef1f4;
    }
    .reference {
      margin-top: 8px;
      color: rgba(23, 32, 52, 0.55);
      font-size: 15px;
      font-weight: 780;
    }
    .search-stage {
      position: absolute;
      left: 72px;
      right: 72px;
      top: 74px;
      z-index: 5;
    }
    .search-stage .sub {
      max-width: 880px;
    }
    .search-phone-wrap {
      position: absolute;
      left: 202px;
      top: 500px;
      z-index: 4;
    }
    .hero-copy {
      position: relative;
      z-index: 4;
      max-width: 780px;
    }
    .hero-phone-wrap {
      position: absolute;
      right: 54px;
      bottom: 122px;
      transform: rotate(4deg);
      z-index: 5;
    }
    .hero-deal {
      position: absolute;
      left: 72px;
      bottom: 220px;
      width: 506px;
      padding: 26px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.24);
      backdrop-filter: blur(18px);
      z-index: 6;
    }
    .hero-deal strong {
      display: block;
      font-size: 34px;
      line-height: 1.2;
      font-weight: 900;
    }
    .hero-deal .deal-price {
      margin-top: 20px;
      display: flex;
      align-items: baseline;
      gap: 18px;
    }
    .hero-deal .deal-price b {
      color: #ffcf6a;
      font-size: 58px;
      line-height: 1;
    }
    .hero-deal .deal-price span {
      color: rgba(255, 255, 255, 0.8);
      font-size: 23px;
      font-weight: 800;
    }
    .deal-grid {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      margin-top: 46px;
    }
    .deal-tile {
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 24px;
      min-height: 245px;
      padding: 18px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 26px 64px rgba(28, 44, 68, 0.13);
    }
    .tile-photo {
      overflow: hidden;
      border-radius: 25px;
      background: #dde7e3;
    }
    .deal-tile h2 {
      margin: 6px 0 0;
      font-size: 32px;
      line-height: 1.18;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .deal-tile .big-save {
      margin-top: 18px;
      color: #d85d3f;
      font-size: 54px;
      font-weight: 950;
      line-height: 1;
    }
    .deal-tile p {
      margin: 14px 0 0;
      color: rgba(23, 32, 52, 0.62);
      font-size: 22px;
      line-height: 1.35;
      font-weight: 650;
    }
    .split-stage {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 560px 1fr;
      gap: 24px;
      margin-top: 46px;
      align-items: start;
    }
    .value-stack {
      display: grid;
      gap: 18px;
      padding-top: 48px;
    }
    .value-card {
      padding: 20px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(23, 32, 52, 0.08);
      box-shadow: 0 22px 48px rgba(28, 44, 68, 0.1);
    }
    .value-card b {
      display: block;
      font-size: 25px;
      line-height: 1.2;
    }
    .value-card span {
      display: block;
      margin-top: 10px;
      color: rgba(23, 32, 52, 0.64);
      font-size: 18px;
      line-height: 1.42;
      font-weight: 650;
    }
    .date-panel {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 26px;
      margin-top: 48px;
    }
    .date-card {
      min-height: 420px;
      padding: 30px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 26px 64px rgba(28, 44, 68, 0.12);
    }
    .date-card .label {
      color: #0c8f79;
      font-size: 22px;
      font-weight: 900;
    }
    .date-card .date {
      margin-top: 22px;
      font-size: 60px;
      line-height: 1;
      font-weight: 950;
    }
    .date-card .copy {
      margin-top: 26px;
      color: rgba(23, 32, 52, 0.68);
      font-size: 28px;
      line-height: 1.42;
      font-weight: 650;
    }
    .compare-list {
      display: grid;
      gap: 15px;
    }
    .compare-date {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 72px;
      padding: 0 22px;
      border-radius: 20px;
      background: #f1f5ee;
      font-size: 24px;
      font-weight: 850;
    }
    .picked-result {
      position: relative;
      z-index: 4;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 24px;
      align-items: stretch;
      margin-top: 34px;
      padding: 18px;
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 28px 70px rgba(28, 44, 68, 0.14);
      border: 1px solid rgba(23, 32, 52, 0.08);
    }
    .picked-result .tile-photo {
      min-height: 300px;
      border-radius: 26px;
    }
    .picked-body {
      min-width: 0;
      padding: 20px 16px 18px 0;
    }
    .picked-body .label {
      color: #0c8f79;
      font-size: 22px;
      font-weight: 900;
    }
    .picked-body h2 {
      margin: 14px 0 0;
      font-size: 34px;
      line-height: 1.18;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .picked-price {
      display: flex;
      align-items: baseline;
      gap: 18px;
      margin-top: 26px;
    }
    .picked-price b {
      color: #d85d3f;
      font-size: 58px;
      line-height: 1;
      font-weight: 950;
    }
    .picked-price span {
      color: rgba(23, 32, 52, 0.58);
      font-size: 23px;
      font-weight: 800;
    }
    .picked-body p {
      margin: 18px 0 0;
      color: rgba(23, 32, 52, 0.62);
      font-size: 23px;
      line-height: 1.38;
      font-weight: 650;
    }
    .timeline {
      position: relative;
      z-index: 3;
      display: grid;
      gap: 18px;
      margin-top: 50px;
      width: 440px;
    }
    .step {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 18px;
      align-items: start;
      padding: 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 20px 48px rgba(28, 44, 68, 0.1);
    }
    .step i {
      width: 64px;
      height: 64px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c8f79;
      color: #fff;
      font-size: 26px;
      font-style: normal;
      font-weight: 950;
    }
    .step b {
      display: block;
      font-size: 28px;
      line-height: 1.18;
    }
    .step span {
      display: block;
      margin-top: 8px;
      color: rgba(23, 32, 52, 0.62);
      font-size: 20px;
      line-height: 1.36;
      font-weight: 650;
    }
    .progress-phone {
      position: absolute;
      right: 34px;
      top: 680px;
      transform: rotate(-3deg);
    }
    .progress-phone .phone {
      width: 500px;
      height: 1000px;
    }
    .progress-phone .screen {
      border-radius: 42px;
      padding: 24px 20px;
    }
    .progress-phone .hotel-card {
      grid-template-columns: 112px 1fr;
      min-height: 136px;
    }
    .progress-phone .photo {
      min-height: 112px;
      border-radius: 16px;
    }
    .mosaic {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 44px;
    }
    .mosaic-card {
      min-height: 300px;
      overflow: hidden;
      border-radius: 32px;
      background: #fff;
      box-shadow: 0 22px 52px rgba(28, 44, 68, 0.12);
    }
    .mosaic-card .tile-photo {
      height: 178px;
      border-radius: 0;
    }
    .mosaic-body {
      padding: 18px;
    }
    .mosaic-body b {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 23px;
      line-height: 1.22;
    }
    .mosaic-body span {
      display: block;
      margin-top: 12px;
      color: #d85d3f;
      font-size: 28px;
      font-weight: 950;
    }
    .brand-grid {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 46px;
    }
    .brand-card {
      min-height: 370px;
      overflow: hidden;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
    }
    .brand-card .tile-photo {
      height: 230px;
      border-radius: 0;
    }
    .brand-body {
      padding: 22px;
    }
    .brand-body b {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: #fff;
      font-size: 25px;
      line-height: 1.22;
    }
    .brand-body span {
      display: block;
      margin-top: 12px;
      color: #ffcf6a;
      font-size: 22px;
      font-weight: 950;
    }
    .final-layout {
      position: relative;
      z-index: 4;
      display: grid;
      grid-template-columns: 1fr 500px;
      gap: 28px;
      margin-top: 52px;
      align-items: end;
    }
    .final-copy {
      align-self: start;
      padding-top: 60px;
    }
    .final-copy .line {
      margin-bottom: 20px;
      padding: 24px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.86);
      font-size: 24px;
      line-height: 1.35;
      font-weight: 750;
    }
    .photo-strip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 470px;
      display: grid;
      grid-template-columns: 1fr 1.15fr 1fr;
      opacity: 0.92;
    }
    .photo-strip .tile-photo {
      border-radius: 0;
    }
    .photo-strip::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(16, 25, 39, 0), #101927 92%);
    }
    .corner-note {
      position: absolute;
      right: 72px;
      top: 80px;
      z-index: 6;
      max-width: 330px;
      padding: 20px 24px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.16);
      color: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.22);
      font-size: 24px;
      line-height: 1.35;
      font-weight: 760;
      backdrop-filter: blur(16px);
    }
    .slide-search h1 {
      font-size: 72px;
      max-width: 820px;
    }
    .slide-search .sub {
      max-width: 900px;

      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[char]));
    const money = value => {
      if (value === null || value === undefined || value === "") return "待补价";
      const number = Number(value);
      if (!Number.isFinite(number)) return "待补价";
      return `¥${Math.round(number).toLocaleString("zh-CN")}`;
    };
    const percent = value => {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      return `${number.toFixed(number % 1 === 0 ? 0 : 1)}%`;
    };
    const distance = hotel => {
      const number = Number(hotel.distance);
      return Number.isFinite(number) ? `${number.toFixed(1)}km` : "附近";
    };
    const star = hotel => {
      const number = Number(hotel.star);
      return Number.isFinite(number) ? `${number.toFixed(number % 1 === 0 ? 0 : 1)}星` : "高星";
    };
    const photo = (hotel, className = "photo") => {
      if (!hotel || !hotel.imageUrl) {
        return `<div class="${className} is-missing"></div>`;
      }
      return `<div class="${className}"><img src="${esc(hotel.imageUrl)}" alt="" loading="eager" onerror="this.parentElement.classList.add('is-missing');this.remove()" /></div>`;
    };
    const saveBadge = hotel => {
      const save = Number(hotel.discount);
      if (hotel.pricePending) return `<span class="save pending">待补价</span>`;
      if (hotel.isDeal && Number.isFinite(save) && save > 0) return `<span class="save">省${money(save)}</span>`;
      return `<span class="save muted">候选</span>`;
    };
    const meta = hotel => `
      <div class="meta">
        <span>${esc(star(hotel))}</span>
        <span>${esc(hotel.brand || "高星酒店")}</span>
        <span>${esc(distance(hotel))}</span>
      </div>`;
    const hotelCard = hotel => `
      <article class="hotel-card">
        ${photo(hotel)}
        <div class="hotel-info">

          <div class="price-row">
            <div class="price">${money(hotel.current)}</div>
            ${saveBadge(hotel)}
          </div>
          <div class="reference">参考价 ${money(hotel.reference)} · 含税价展示</div>
        </div>
      </article>`;
    const phone = (hotels, options = {}) => {
      const items = (hotels && hotels.length ? hotels : allVisible).slice(0, options.limit || 4);
      const mode = options.mode || "deal";
      const title = mode === "candidate" ? "附近星级候选" : mode === "brand" ? "高端品牌推荐" : "适合捡漏";

      return `
        <div class="phone ${options.large ? "large" : ""} ${options.compact ? "compact-phone" : ""}">
          <div class="screen">
            <div class="status"><span>9:41</span><i></i><span>100%</span></div>
            <div class="app-title">
              <b>星级酒店<br>捡漏雷达</b>
              <span>实时搜索</span>
            </div>
            <div class="search-card">
              <div class="field-row">
                <div class="field"><strong>目标城市</strong><span>${esc(DATA.summary.city)}</span></div>
                <div class="field"><strong>入住日期</strong><span>6月1日</span></div>
              </div>
              <div class="field" style="margin-top:14px"><strong>目标酒店/地区</strong><span>${esc(DATA.summary.target)}</span></div>
              <div class="search-button">开始捡漏</div>
            </div>
            <div class="progress">
              <div class="progress-top"><span>${esc(options.progress || "结果已出现，继续补充中")}</span><span>${esc(options.progressValue || "76%")}</span></div>
              <div class="bar"><span style="width:${esc(options.bar || "76%")}"></span></div>
            </div>
            <div class="tabs">
              <div class="tab ${mode === "deal" ? "active" : ""}">${tabLabel}</div>
              <div class="tab ${mode === "candidate" ? "active" : ""}">星级候选</div>
              <div class="tab ${mode === "brand" ? "active" : ""}">高端连锁</div>
            </div>
            <div class="feed">${items.map(hotelCard).join("")}</div>
          </div>
        </div>`;
    };
    const dealTile = hotel => `
      <article class="deal-tile">
        ${photo(hotel, "tile-photo")}

        </div>
      </article>`;
    const mosaicCard = hotel => `
      <article class="mosaic-card">
        ${photo(hotel, "tile-photo")}

    const brandCard = hotel => `
      <article class="brand-card">

          ${foot("真实搜索数据来自深圳国际会展中心 2026-06-01")}

      "2": `

            </div>

            <div class="step"><i>1</i><div><b>先有酒店可看</b><span>先展示已找到的星级候选，马上知道附近有哪些选择。</span></div></div>
            <div class="step"><i>2</i><div><b>价格陆续补齐</b><span>含税价、参考价、便宜多少，会随着结果一起更新。</span></div></div>
            <div class="step"><i>3</i><div><b>选择越来越完整</b><span>后续找到的星级酒店继续加入列表，方便一起比较。</span></div></div>
            <div class="step"><i>4</i><div><b>没有捡漏也有备选</b><span>暂时没有明显低价，也能看到附近高星酒店。</span></div></div>
          </div>
          <div class="progress-phone">${phone(DATA.candidates.slice(0, 4), { compact: true, mode: "candidate", limit: 4, progress: "更多酒店陆续出现", progressValue: "更新中", bar: "62%" })}</div>
          ${foot("不用盯着空白页面等待")}
